<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | UtilitySuite</title>
    <meta name="description" content="Convert WebP files to PNG or JPG easily. Fast, free, and simple online tool for better image compatibility.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f1f5f9; 
            --primary: #4f46e5;
            --secondary: #475569;
            --text: #1e293b;
            --border: #e2e8f0;
            --font-family: 'Outfit', sans-serif;
        }
        body { margin: 0; font-family: var(--font-family); background-color: var(--bg-color); color: var(--text); display: flex; min-height: 100vh; }

        .top-accent { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); z-index: 1000; }

        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); padding: 60px 20px; flex-shrink: 0; }
        .brand { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.25em; color: #64748b; margin-bottom: 30px; padding-left: 20px; }
        
        #tools-sidebar { display: flex; flex-direction: column; }
        .tool-btn { 
            display: block; padding: 16px 20px; margin: 2px 0; border-radius: 10px; 
            text-decoration: none; color: #475569; font-size: 13px; font-weight: 600; 
            transition: all 0.2s; border-bottom: 1px solid #f8fafc;
        }
        .tool-btn:hover { background: #f5f3ff; color: var(--primary); border-bottom-color: #e0e7ff; }

        .main-content { flex: 1; padding: 60px 40px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { max-width: 800px; width: 100%; }

        h1 { margin: 0 0 40px 0; color: #0f172a; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; }

        .ad-container { display: flex; justify-content: center; margin: 20px 0; overflow: hidden; }
        
        .card { background: white; padding: 32px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }

        .drop-zone { width: 100%; height: 250px; border: 3px dashed var(--border); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; margin-bottom: 25px;}
        .drop-zone:hover { border-color: var(--primary); background: #f8fafc; }
        .drop-zone.active { border-color: var(--primary); background: #e0e7ff; color: var(--primary); }
        .drop-zone p { margin: 0; font-weight: 600; font-size: 1.1rem;}
        
        #preview { max-width: 100%; max-height: 100%; display: none; position: absolute; border-radius: 8px;}
        input[type="file"] { display: none; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; text-transform: uppercase; font-family: var(--font-family); }
        button:hover { filter: brightness(1.1); }
        button.webp { background: var(--secondary); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 30px 20px; }
            .main-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    <aside class="sidebar">
        <div class="brand">UtilitySuite</div>
        <div id="tools-sidebar"></div>
    </aside>

    <main class="main-content">
        <div class="wrapper">
            <h1>Image Converter</h1>

            <div class="ad-container">
                <script>atOptions = {'key' : 'ea9023c6230a4134ea2bb21d415f3647', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {}};</script>
                <script src="https://www.highperformanceformat.com/ea9023c6230a4134ea2bb21d415f3647/invoke.js"></script>
            </div>

            <div class="card">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('upload').click()">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
                    <p>Drag & Drop an image</p>
                    <span style="font-size: 0.85rem; margin-top: 5px;">or click to browse</span>
                    <img id="preview" src="" alt="Preview">
                </div>
                
                <input type="file" id="upload" accept="image/*" onchange="handleFile(this.files[0])">
                
                <div class="button-group">
                    <button onclick="convert('image/png')">Convert to PNG</button>
                    <button class="webp" onclick="convert('image/webp')">Convert to WebP</button>
                </div>
            </div>

            <div class="ad-container">
                <script>atOptions = {'key' : '7cf39fb102b8e5ac06d9ab8ec745e58c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {}};</script>
                <script src="https://www.highperformanceformat.com/7cf39fb102b8e5ac06d9ab8ec745e58c/invoke.js"></script>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const previewImg = document.getElementById('preview');
        let currentFile = null;

        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, e => { e.preventDefault(); dropZone.classList.add('active'); });
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, e => { e.preventDefault(); dropZone.classList.remove('active'); });
        });
        dropZone.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                dropZone.querySelectorAll('p, div, span').forEach(el => { if(el !== previewImg) el.style.display = 'none'; });
            };
            reader.readAsDataURL(file);
        }

        function convert(format) {
            if (!currentFile) return alert("Please upload an image first!");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const dataUrl = canvas.toDataURL(format);
                    const link = document.createElement('a');
                    link.download = `converted.${format.split('/')[1]}`;
                    link.href = dataUrl;
                    link.click();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(currentFile);
        }

        const tools = [
            { name: "QR Generator", url: "https://zaraouilabs.github.io/QR-Code-Generator/" },
            { name: "Image Compressor", url: "https://zaraouilabs.github.io/Image-Compressor/" },
            { name: "Date Calculator", url: "https://zaraouilabs.github.io/Date-Calculator/" },
            { name: "HEIC Converter", url: "https://zaraouilabs.github.io/HEIC-to-JPEG-converter/" },
            { name: "WebP Converter", url: "https://zaraouilabs.github.io/webp-to-jpg-convertor/" },
            { name: "JSON Formatter", url: "https://zaraouilabs.github.io/JSON-formatter/" },
            { name: "Word Counter", url: "https://zaraouilabs.github.io/wordcount-pro/" },
            { name: "Case Converter", url: "https://zaraouilabs.github.io/case-converter/" },
            { name: "Percentage Calc", url: "https://zaraouilabs.github.io/percentage_counter/" },
            { name: "Base64 Converter", url: "https://zaraouilabs.github.io/Base64_convertor/" },
            { name: "Password Generator", url: "https://zaraouilabs.github.io/Password_Generator/" },
            { name: "Loan Calculator", url: "https://zaraouilabs.github.io/loan-calculator/" }
        ];
        document.getElementById('tools-sidebar').innerHTML = tools.map(t => `<a href="${t.url}" class="tool-btn">${t.name}</a>`).join('');
    </script>
    <script src="https://pl30403648.effectivecpmnetwork.com/8d/6e/16/8d6e16cf626599011a4b1d03060dc5cf.js"></script>
</body>
</html>
