<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | Professional Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-light: #818cf8; --bg: #f8fafc; --card: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        .wrapper { width: 95%; max-width: 800px; margin: 0 auto; }
        
        .ad-container { margin: 20px auto; border-radius: 16px; overflow: hidden; display: flex; justify-content: center; background: #f1f5f9; align-items: center; border: 1px solid #e2e8f0; width: 100%; min-height: 90px; }
        
        header h1 { font-size: 2.5rem; font-weight: 800; color: #6366f1; text-align: center; margin: 0 0 30px 0; }
        
        .card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

        .drop-zone { width: 100%; height: 250px; border: 3px dashed #cbd5e1; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; margin-bottom: 25px;}
        .drop-zone:hover { border-color: var(--primary); background: #f1f5f9; }
        .drop-zone.active { border-color: var(--primary); background: #e0e7ff; color: var(--primary); }
        .drop-zone p { margin: 0; font-weight: 500; font-size: 1.1rem;}
        .drop-zone .icon { font-size: 3rem; margin-bottom: 10px; opacity: 0.7; }
        
        #preview { max-width: 100%; max-height: 100%; display: none; position: absolute; border-radius: 8px;}
        input[type="file"] { display: none; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.webp { background: #475569; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Image Converter</h1>
        </header>

        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {'key' : 'ea9023c6230a4134ea2bb21d415f3647', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {}};
            </script>
            <script type="text/javascript" async src="https://www.highperformanceformat.com/ea9023c6230a4134ea2bb21d415f3647/invoke.js"></script>
        </div>

        <div class="card">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('upload').click()">
                <div class="icon">📁</div>
                <p>Drag & Drop an image</p>
                <span style="font-size: 0.8rem; margin-top: 5px;">or click to browse</span>
                <img id="preview" src="" alt="Preview">
            </div>
            
            <input type="file" id="upload" accept="image/*" onchange="handleFile(this.files[0])">
            
            <div class="button-group">
                <button onclick="convert('image/png')">Convert to PNG</button>
                <button class="webp" onclick="convert('image/webp')">Convert to WebP</button>
            </div>
        </div>

        <div class="ad-container" style="min-height: 250px;">
            <script type="text/javascript">
                atOptions = {'key' : '7cf39fb102b8e5ac06d9ab8ec745e58c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {}};
            </script>
            <script type="text/javascript" async src="https://www.highperformanceformat.com/7cf39fb102b8e5ac06d9ab8ec745e58c/invoke.js"></script>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('upload');
        const previewImg = document.getElementById('preview');
        let currentFile = null;

        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, e => { e.preventDefault(); dropZone.classList.add('active'); });
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, e => { e.preventDefault(); dropZone.classList.remove('active'); });
        });
        dropZone.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                dropZone.querySelectorAll('p, .icon, span').forEach(el => el.style.display = 'none');
            };
            reader.readAsDataURL(file);
        }

        function convert(format) {
            if (!currentFile) return alert("Please upload an image first!");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const dataUrl = canvas.toDataURL(format);
                    const link = document.createElement('a');
                    link.download = `converted.${format.split('/')[1]}`;
                    link.href = dataUrl;
                    link.click();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(currentFile);
        }
    </script>
</body>
</html>
